# =============================================================================
# Docker Compose Override for Local Development
# This file is automatically loaded by docker-compose
# =============================================================================

version: "3.8"

services:
  api:
    build:
      target: development
    volumes:
      - .:/app
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      target: development
    volumes:
      - .:/app
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: celery -A app.tasks.celery_app worker -Q scrape,default -l debug -c 1

  scheduler:
    build:
      target: development
    volumes:
      - .:/app
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
