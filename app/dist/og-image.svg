<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MWPanel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b2138"/>
      <stop offset="100%" stop-color="#1e5a8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="100" width="1040" height="430" rx="34" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)"/>

  <g filter="url(#shadow)">
    <rect x="150" y="190" width="150" height="150" rx="28" fill="#ffffff"/>
    <path d="M180 300 L205 225 L230 280 L255 225 L280 300" stroke="#1e5a8a" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="350" y="275" fill="#ffffff" font-size="96" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">MWPanel</text>
  <text x="352" y="335" fill="#d9e8f5" font-size="36" font-family="Inter, Segoe UI, Arial, sans-serif">Panel ofert nieruchomości</text>
</svg>
